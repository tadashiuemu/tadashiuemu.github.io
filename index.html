<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI音声文字起こし君</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #1a73e8;
            font-size: 22px;
            margin-bottom: 20px;
        }
        #status {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        #result-area {
            width: 100%;
            height: 200px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 16px;
            line-height: 1.6;
            text-align: left;
            overflow-y: auto;
            background-color: #fafafa;
            box-sizing: border-box;
            white-space: pre-wrap;
        }
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #start-btn {
            background-color: #34a853;
            color: white;
        }
        #start-btn:disabled {
            background-color: #ccc;
        }
        #stop-btn {
            background-color: #ea4335;
            color: white;
        }
        #copy-btn {
            background-color: #1a73e8;
            color: white;
        }
        button:hover:not(:disabled) {
            opacity: 0.8;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>音声文字起こしアプリ</h1>
        <p id="status">「開始」を押して話しかけてください</p>
        
        <div id="result-area" id="result-text"></div>

        <div class="buttons">
            <button id="start-btn" onclick="startRecognition()">開始</button>
            <button id="stop-btn" onclick="stopRecognition()">停止</button>
            <button id="copy-btn" onclick="copyText()">コピー</button>
        </div>
    </div>

    <script>
        // Web Speech APIの呼び出し
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            alert("お使いのブラウザは音声認識に対応していません。Chromeをお試しください。");
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';      // 日本語に設定
        recognition.interimResults = true; // 途中の経過も表示する
        recognition.continuous = true;     // 連続して認識する

        const resultArea = document.getElementById('result-area');
        const statusText = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');

        let finalTranscript = ''; // 確定した文章を保存する変数

        // 音声認識が結果を返した時
        recognition.onresult = (event) => {
            let interimTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    finalTranscript += transcript + '\n';
                } else {
                    interimTranscript = transcript;
                }
            }
            // 確定した部分と、今話している途中の部分を合わせて表示
            resultArea.innerText = finalTranscript + interimTranscript;
            // 自動スクロール
            resultArea.scrollTop = resultArea.scrollHeight;
        };

        // 録音開始
        function startRecognition() {
            recognition.start();
            statusText.innerText = "● 録音中...";
            statusText.style.color = "#ea4335";
            startBtn.disabled = true;
        }

        // 録音停止
        function stopRecognition() {
            recognition.stop();
            statusText.innerText = "停止しました";
            statusText.style.color = "#666";
            startBtn.disabled = false;
        }

        // テキストをクリップボードにコピー
        function copyText() {
            const text = resultArea.innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("テキストをコピーしました！");
            });
        }

        // エラー処理
        recognition.onerror = (event) => {
            console.error(event.error);
            statusText.innerText = "エラーが発生しました";
            startBtn.disabled = false;
        };
    </script>
</body>
</html>
