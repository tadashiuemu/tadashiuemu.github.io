<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ビットコイン価格チェッカー</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a1a; /* ダークモード風 */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2d2d2d;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            width: 320px;
        }
        h1 {
            font-size: 18px;
            color: #f3ba2f; /* ビットコインカラー */
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .price-box {
            margin: 30px 0;
        }
        #price {
            font-size: 36px;
            font-weight: bold;
            color: #ffffff;
        }
        .unit {
            font-size: 18px;
            margin-left: 5px;
        }
        #last-update {
            font-size: 12px;
            color: #888;
            margin-top: 20px;
        }
        button {
            background-color: #f3ba2f;
            color: #1a1a1a;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #ffcc4d;
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .loading {
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bitcoin Price (BTC)</h1>
        <div class="price-box">
            <span id="price">取得中...</span><span class="unit">円</span>
        </div>
        <button onclick="fetchPrice()">価格を更新する</button>
        <p id="last-update">データ取得中...</p>
    </div>

    <script>
        async function fetchPrice() {
            const priceElement = document.getElementById('price');
            const updateElement = document.getElementById('last-update');
            const button = document.querySelector('button');

            // ローディング中の表示
            priceElement.classList.add('loading');
            button.disabled = true;
            button.textContent = '更新中...';

            try {
                // 教えていただいたAPIのURL
                const url = 'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=jpy';
                
                // データを取得 (fetch)
                const response = await fetch(url);
                const data = await response.json();

                // 取得したデータから価格を取り出す
                const btcPrice = data.bitcoin.jpy;

                // 3桁ごとにカンマを入れて表示
                priceElement.textContent = btcPrice.toLocaleString();
                
                // 更新時刻を表示
                const now = new Date();
                updateElement.textContent = '最終更新: ' + now.toLocaleTimeString();

            } catch (error) {
                priceElement.textContent = 'エラー';
                updateElement.textContent = 'データの取得に失敗しました';
                console.error(error);
            } finally {
                // 表示を戻す
                priceElement.classList.remove('loading');
                button.disabled = false;
                button.textContent = '価格を更新する';
            }
        }

        // ページを開いた時に一度実行する
        fetchPrice();

        // 60秒ごとに自動更新する設定
        setInterval(fetchPrice, 60000);
    </script>
</body>
</html>
