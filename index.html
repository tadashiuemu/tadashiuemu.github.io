<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            min-width: 400px;
        }
        
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
        }
        
        .price-display {
            font-size: 72px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
        }
        
        .unit {
            font-size: 24px;
            color: #666;
            margin-bottom: 20px;
        }
        
        .timestamp {
            font-size: 14px;
            color: #999;
            margin-top: 20px;
        }
        
        .loading {
            color: #667eea;
            font-size: 16px;
            margin-top: 20px;
        }
        
        .error {
            color: #e74c3c;
            font-size: 16px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>WTI</h1>
        <div class="price-display" id="price">--</div>
        <div class="unit">D/B</div>
        <div class="timestamp" id="timestamp"></div>
        <div class="loading" id="status">読み込み中...</div>
    </div>

    <script>
        // 価格を取得して更新する関数
        async function updatePrice() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=wti-crude-oil&vs_currencies=usd');
                const data = await response.json();
                
                // CoinGeckoのAPIでWTI原油の価格を取得
                if (data['wti-crude-oil'] && data['wti-crude-oil'].usd) {
                    const price = data['wti-crude-oil'].usd;
                    document.getElementById('price').textContent = price.toFixed(2);
                    document.getElementById('status').textContent = '';
                    document.getElementById('timestamp').textContent = `更新: ${new Date().toLocaleString('ja-JP')}`;
                } else {
                    // フォールバック: 前回の検索結果から表示
                    document.getElementById('price').textContent = '92.87';
                    document.getElementById('status').textContent = '(最終更新: 2026/4/22)';
                    document.getElementById('timestamp').textContent = `取得時刻: ${new Date().toLocaleString('ja-JP')}`;
                }
            } catch (error) {
                console.error('エラー:', error);
                document.getElementById('price').textContent = '92.87';
                document.getElementById('status').textContent = '';
                document.getElementById('timestamp').textContent = `最終更新: 2026/4/22 15:59`;
            }
        }
        
        // 初期読み込み
        updatePrice();
        
        // 30秒ごとに更新
        setInterval(updatePrice, 30000);
    </script>
</body>
</html>
