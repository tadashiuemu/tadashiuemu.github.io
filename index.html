<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIおみくじアプリ</title>
    <style>
        /* CSS：デザイン担当 */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 30px;
        }
        #result {
            font-size: 48px;
            font-weight: bold;
            color: #e74c3c;
            margin: 20px 0;
            min-height: 60px; /* 結果が出る前の高さを確保 */
        }
        #comment {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            min-height: 1.2em;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>今日の運勢</h1>
        <div id="result">？</div>
        <p id="comment">ボタンを押して占ってね</p>
        <button onclick="drawOmikuji()">おみくじを引く</button>
    </div>

    <script>
        function drawOmikuji() {
            // おみくじの結果リスト
            const fortunes = [
                { result: '大吉', comment: '最高の一日！何をやってもうまくいきそう。' },
                { result: '吉', comment: '良いことあるかも。コツコツ進むのが吉。' },
                { result: '中吉', comment: '平凡こそ幸せ。落ち着いて過ごせそう。' },
                { result: '小吉', comment: '小さなラッキーが見つかるかも。' },
                { result: '末吉', comment: '焦らずゆっくり行きましょう。' },
                { result: '凶', comment: '今日は無理せず、早めに休みましょう。' }
            ];

            // ランダムに１つ選ぶ（0〜5の乱数を作る）
            const randomIndex = Math.floor(Math.random() * fortunes.length);
            const selectedFortune = fortunes[randomIndex];

            // 画面に反映させる
            document.id('result').textContent = selectedFortune.result;
            document.id('comment').textContent = selectedFortune.comment;

            // ボタンの文字を変える
            document.querySelector('button').textContent = 'もう一度引く';
        }

        // document.id(id名) で要素を取得できるようにする便利なショートカット関数
        document.id = function(id) {
            return document.getElementById(id);
        };
    </script>
</body>
</html>
