<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI音声文字起こし君（スピーカー対応版）</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        h1 { color: #1a73e8; font-size: 22px; margin-bottom: 20px; }
        #status { font-size: 14px; color: #666; margin-bottom: 10px; font-weight: bold; }
        #result-area { width: 100%; height: 250px; border: 2px solid #e0e0e0; border-radius: 10px; padding: 15px; margin-bottom: 20px; font-size: 16px; line-height: 1.6; text-align: left; overflow-y: auto; background-color: #fafafa; box-sizing: border-box; white-space: pre-wrap; }
        .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; font-size: 14px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        #start-mic { background-color: #34a853; color: white; }
        #start-speaker { background-color: #fbbc05; color: white; }
        #stop-btn { background-color: #ea4335; color: white; }
        #clear-btn { background-color: #808080; color: white; }
        button:hover:not(:disabled) { opacity: 0.8; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .info-text { font-size: 11px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>音声文字起こしアプリ</h1>
        <div id="status">モードを選択してください</div>
        
        <div id="result-area"></div>

        <div class="buttons">
            <button id="start-mic" onclick="startMic()">マイクで開始</button>
            <button id="start-speaker" onclick="startSpeaker()">スピーカー音を開始</button>
            <button id="stop-btn" onclick="stopRecognition()" disabled>停止</button>
            <button id="clear-btn" onclick="clearText()">全消去</button>
        </div>
        <p class="info-text">※スピーカー音は「システムオーディオを共有」をオンにしてください</p>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = true;

        const resultArea = document.getElementById('result-area');
        const statusText = document.getElementById('status');
        const stopBtn = document.getElementById('stop-btn');
        const micBtn = document.getElementById('start-mic');
        const spkBtn = document.getElementById('start-speaker');

        let finalTranscript = '';
        let externalStream = null;

        recognition.onresult = (event) => {
            let interimTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    finalTranscript += transcript + '\n';
                } else {
                    interimTranscript = transcript;
                }
            }
            resultArea.innerText = finalTranscript + interimTranscript;
            resultArea.scrollTop = resultArea.scrollHeight;
        };

        // マイク録音
        async function startMic() {
            resetButtons(true);
            statusText.innerText = "● マイク録音中...";
            recognition.start();
        }

        // スピーカー音録音（画面共有の音声を活用）
        async function startSpeaker() {
            try {
                // ブラウザの画面共有機能を使って音を拾う
                externalStream = await navigator.mediaDevices.getDisplayMedia({
                    video: true, // 映像は必須
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }
                });

                const audioTracks = externalStream.getAudioTracks();
                if (audioTracks.length === 0) {
                    alert("「システムオーディオを共有」にチェックを入れてください。");
                    stopRecognition();
                    return;
                }

                resetButtons(true);
                statusText.innerText = "● スピーカー音を文字起こし中...";
                recognition.start();

            } catch (err) {
                console.error(err);
                statusText.innerText = "開始できませんでした";
            }
        }

        function stopRecognition() {
            recognition.stop();
            if (externalStream) {
                externalStream.getTracks().forEach(track => track.stop());
            }
            statusText.innerText = "停止しました";
            resetButtons(false);
        }

        function resetButtons(isRunning) {
            micBtn.disabled = isRunning;
            spkBtn.disabled = isRunning;
            stopBtn.disabled = !isRunning;
        }

        function clearText() {
            if (confirm("すべて消去しますか？")) {
                finalTranscript = '';
                resultArea.innerText = '';
            }
        }
    </script>
</body>
</html>
