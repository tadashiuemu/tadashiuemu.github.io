<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSS PDF Viewer</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a2b;
      --panel-2: #1a2440;
      --text: #e8ecf3;
      --muted: #9aa4b2;
      --accent: #4f8cff;
      --accent-hover: #6a9dff;
      --border: #2b3758;
      --danger: #ff6b6b;
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
      background: linear-gradient(180deg, #0a0f1d, #10182d);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(10, 15, 29, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px;
      align-items: center;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px;
    }

    button,
    input,
    select {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #253253;
      border-color: #3a4a74;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    button.primary:hover {
      background: var(--accent-hover);
    }

    input[type="number"] {
      width: 80px;
    }

    input[type="text"] {
      min-width: 220px;
    }

    .hint {
      padding: 0 14px 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .viewer-wrap {
      display: grid;
      place-items: start center;
      padding: 20px;
      overflow: auto;
    }

    .viewer-shell {
      width: min(100%, 1200px);
    }

    .dropzone {
      border: 2px dashed #44537a;
      border-radius: 18px;
      padding: 28px;
      text-align: center;
      background: rgba(18, 26, 43, 0.7);
      color: var(--muted);
      margin-bottom: 18px;
    }

    .dropzone.dragover {
      border-color: var(--accent);
      background: rgba(79, 140, 255, 0.08);
      color: var(--text);
    }

    .status {
      margin: 12px 0;
      color: var(--muted);
      font-size: 14px;
    }

    .error {
      color: var(--danger);
      font-weight: 600;
    }

    .canvas-wrap {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    canvas {
      max-width: 100%;
      height: auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }

    .footer {
      padding: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    .hidden {
      display: none !important;
    }

    .badge {
      font-size: 12px;
      color: var(--muted);
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
    }

    @media (max-width: 720px) {
      .toolbar {
        padding: 10px;
      }

      .toolbar-group {
        width: 100%;
        justify-content: flex-start;
        flex-wrap: wrap;
      }

      input[type="text"] {
        min-width: 160px;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="toolbar">
        <div class="toolbar-group">
          <input type="file" id="fileInput" accept="application/pdf" />
          <button class="primary" id="openSampleBtn">サンプルPDFを開く</button>
        </div>

        <div class="toolbar-group">
          <button id="prevBtn">← 前</button>
          <span id="pageInfo" class="badge">0 / 0</span>
          <button id="nextBtn">次 →</button>
          <input type="number" id="pageNumber" min="1" value="1" />
          <button id="goPageBtn">移動</button>
        </div>

        <div class="toolbar-group">
          <button id="zoomOutBtn">－</button>
          <span id="zoomInfo" class="badge">100%</span>
          <button id="zoomInBtn">＋</button>
          <button id="fitWidthBtn">幅に合わせる</button>
        </div>

        <div class="toolbar-group">
          <input type="text" id="pdfUrlInput" placeholder="公開PDFのURLを貼る" />
          <button id="loadUrlBtn">URL読込</button>
        </div>

        <div class="toolbar-group">
          <button id="downloadBtn">ダウンロード</button>
        </div>
      </div>

      <div class="hint">
        GitHub Pagesでそのまま動くHTML版。PDFファイル選択、ドラッグ&ドロップ、公開URL読込に対応。
      </div>
    </div>

    <div class="viewer-wrap">
      <div class="viewer-shell">
        <div class="dropzone" id="dropzone">
          <strong>ここにPDFをドラッグ＆ドロップ</strong><br />
          または上の「ファイルを選択」で開いてください
        </div>

        <div id="status" class="status">PDFを選ぶとここに表示されます。</div>

        <div class="canvas-wrap">
          <canvas id="pdfCanvas"></canvas>
        </div>
      </div>
    </div>

    <div class="footer">
      Powered by PDF.js (Open Source)
    </div>
  </div>

  <script type="module">
    import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs";

    const fileInput = document.getElementById("fileInput");
    const openSampleBtn = document.getElementById("openSampleBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const pageInfo = document.getElementById("pageInfo");
    const pageNumber = document.getElementById("pageNumber");
    const goPageBtn = document.getElementById("goPageBtn");
    const zoomOutBtn = document.getElementById("zoomOutBtn");
    const zoomInBtn = document.getElementById("zoomInBtn");
    const zoomInfo = document.getElementById("zoomInfo");
    const fitWidthBtn = document.getElementById("fitWidthBtn");
    const pdfUrlInput = document.getElementById("pdfUrlInput");
    const loadUrlBtn = document.getElementById("loadUrlBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const statusEl = document.getElementById("status");
    const canvas = document.getElementById("pdfCanvas");
    const ctx = canvas.getContext("2d");
    const dropzone = document.getElementById("dropzone");

    let pdfDoc = null;
    let currentPage = 1;
    let scale = 1.2;
    let currentPdfUrl = null;
    let currentPdfBlobUrl = null;
    let rendering = false;
    let pendingPage = null;

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.className = isError ? "status error" : "status";
    }

    function updatePageInfo() {
      const total = pdfDoc ? pdfDoc.numPages : 0;
      pageInfo.textContent = `${currentPage} / ${total}`;
      pageNumber.value = currentPage;
      zoomInfo.textContent = `${Math.round(scale * 100)}%`;
    }

    async function renderPage(pageNum) {
      if (!pdfDoc) return;

      rendering = true;
      setStatus(`ページ ${pageNum} を描画中...`);

      try {
        const page = await pdfDoc.getPage(pageNum);
        const viewport = page.getViewport({ scale });

        const outputScale = window.devicePixelRatio || 1;

        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.height = Math.floor(viewport.height * outputScale);
        canvas.style.width = `${Math.floor(viewport.width)}px`;
        canvas.style.height = `${Math.floor(viewport.height)}px`;

        ctx.setTransform(outputScale, 0, 0, outputScale, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        await page.render({
          canvasContext: ctx,
          viewport
        }).promise;

        currentPage = pageNum;
        updatePageInfo();
        setStatus(`表示中: ページ ${currentPage} / ${pdfDoc.numPages}`);
      } catch (err) {
        console.error(err);
        setStatus("PDFの描画に失敗しました。", true);
      } finally {
        rendering = false;
        if (pendingPage !== null) {
          const next = pendingPage;
          pendingPage = null;
          renderPage(next);
        }
      }
    }

    function queueRenderPage(pageNum) {
      if (rendering) {
        pendingPage = pageNum;
      } else {
        renderPage(pageNum);
      }
    }

    async function loadPdf(src) {
      try {
        setStatus("PDFを読み込み中...");
        const loadingTask = pdfjsLib.getDocument(src);
        pdfDoc = await loadingTask.promise;
        currentPage = 1;
        updatePageInfo();
        await renderPage(currentPage);
      } catch (err) {
        console.error(err);
        setStatus("PDFの読み込みに失敗しました。URL先のCORS設定の問題の可能性もあります。", true);
      }
    }

    async function loadPdfFromFile(file) {
      if (!file) return;
      if (file.type !== "application/pdf") {
        setStatus("PDFファイルを選んでください。", true);
        return;
      }

      if (currentPdfBlobUrl) {
        URL.revokeObjectURL(currentPdfBlobUrl);
      }

      currentPdfBlobUrl = URL.createObjectURL(file);
      currentPdfUrl = currentPdfBlobUrl;
      await loadPdf(currentPdfBlobUrl);
    }

    function goToPage(pageNum) {
      if (!pdfDoc) return;
      const total = pdfDoc.numPages;
      if (pageNum < 1 || pageNum > total) return;
      queueRenderPage(pageNum);
    }

    function fitToWidth() {
      if (!pdfDoc) return;
      pdfDoc.getPage(currentPage).then((page) => {
        const unscaled = page.getViewport({ scale: 1 });
        const containerWidth = document.querySelector(".viewer-shell").clientWidth - 20;
        scale = Math.max(0.4, containerWidth / unscaled.width);
        updatePageInfo();
        queueRenderPage(currentPage);
      });
    }

    fileInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      await loadPdfFromFile(file);
    });

    openSampleBtn.addEventListener("click", async () => {
      const sampleUrl = "https://mozilla.github.io/pdf.js/web/compressed.tracemonkey-pldi-09.pdf";
      currentPdfUrl = sampleUrl;
      pdfUrlInput.value = sampleUrl;
      await loadPdf(sampleUrl);
    });

    prevBtn.addEventListener("click", () => {
      if (!pdfDoc || currentPage <= 1) return;
      goToPage(currentPage - 1);
    });

      if (!pdfDoc || currentPage >= pdfDoc.numPages) return;
      goToPage(currentPage + 1);<span class="cursor">█</span>
