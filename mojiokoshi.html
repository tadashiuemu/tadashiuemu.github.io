<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser-Base Whisper Test</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: #121212; 
            color: #e0e0e0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: #1e1e1e; 
            padding: 2.5rem; 
            border-radius: 1.5rem; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
            width: 90%; 
            max-width: 600px; 
            text-align: center; 
        }
        h1 { color: #bb86fc; font-size: 1.8rem; margin-bottom: 0.5rem; }
        #status { font-size: 0.9rem; color: #03dac6; margin-bottom: 1rem; min-height: 1.2rem; }
        #output { 
            background: #2c2c2c; 
            padding: 1.2rem; 
            border-radius: 0.8rem; 
            height: 220px; 
            overflow-y: auto; 
            text-align: left; 
            white-space: pre-wrap; 
            margin-bottom: 1.5rem; 
            border: 1px solid #333; 
            line-height: 1.6;
            font-size: 15px;
        }
        .controls { display: flex; gap: 15px; justify-content: center; }
        button { 
            padding: 12px 25px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.2s; 
            font-size: 16px;
        }
        #record-btn { background: #03dac6; color: #121212; }
        #record-btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        #record-btn.recording { background: #cf6679; color: white; }
        
        .loading-bar { height: 6px; background: #333; width: 100%; margin-bottom: 1.5rem; border-radius: 3px; overflow: hidden; }
        #progress { height: 100%; background: #bb86fc; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

<div class="card">
    <h1>Whisper on Browser</h1>
    <div id="status">エンジンの起動を待っています...</div>
    <div class="loading-bar"><div id="progress"></div></div>
    
    <div id="output">マイクを許可して「録音開始」を押してください。
AI（Whisper）があなたのブラウザ内で直接解析します。</div>

    <div class="controls">
        <button id="record-btn" disabled>準備中...</button>
    </div>
</div>

<script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';

    const status = document.getElementById('status');
    const output = document.getElementById('output');
    const btn = document.getElementById('record-btn');
    const progress = document.getElementById('progress');

    let transcriber;
    let recording = false;
    let audioContext;
    let stream;
    let processor;
    let audioChunks = [];

    // --- 1. AIモデルのロード開始 ---
    async function initAI() {
        try {
            status.innerText = 'AIモデルをダウンロード中... (約75MB)';
            
            transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny', {
                progress_callback: (p) => {
                    if (p.status === 'progress') {
                        progress.style.width = p.progress + '%';
                        status.innerText = `モデル読み込み中: ${Math.round(p.progress)}%`;
                    }
                }
            });

            status.innerText = '準備完了！いつでも話しかけてください';
            btn.innerText = '録音開始';
            btn.disabled = false;
            progress.style.width = '100%';
        } catch (e) {
            console.error(e);
            status.innerText = 'エラー：モデルの読み込みに失敗しました。';
            output.innerText = 'エラー内容: ' + e.message;
        }
    }

    // --- 2. 録音と解析の処理 ---
    btn.onclick = async () => {
        if (!recording) {
            startRecording();
        } else {
            stopAndProcess();
        }
    };

    async function startRecording() {
        try {
            audioChunks = [];
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new AudioContext({ sampleRate: 16000 });
            
            const source = audioContext.createMediaStreamSource(stream);
            processor = audioContext.createScriptProcessor(4096, 1, 1);

            source.connect(processor);
            processor.connect(audioContext.destination);

            processor.onaudioprocess = (e) => {
                audioChunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
            };

            btn.innerText = '停止して解析';
            btn.classList.add('recording');
            output.innerText = '録音中... \n（話し終わったら停止を押してください）';
            recording = true;
        } catch (err) {
            alert('マイクの使用を許可してください。');
        }
    }

    async function stopAndProcess() {
        recording = false;
        btn.disabled = true;
        btn.innerText = '解析中...';
        btn.classList.remove('recording');
        status.innerText = 'AIが推論を行っています...';

        // 録音停止
        if (processor) processor.disconnect();
        if (stream) stream.getTracks().forEach(t => t.stop());

        // 音声データをAIが読める形式に統合
        const mergedArray = new Float32Array(audioChunks.length * 4096);
        for (let i = 0; i < audioChunks.length; i++) {
            mergedArray.set(audioChunks[i], i * 4096);
        }

        // --- AI推論の実行 ---
        const start = performance.now();
        try {
            const result = await transcriber(mergedArray, { 
                language: 'japanese',
                task: 'transcribe'
            });
            const end = performance.now();
            output.innerText = result.text;
            status.innerText = `解析成功！ (処理時間: ${((end - start) / 1000).toFixed(1)}秒)`;
        } catch (err) {
            output.innerText = '解析中にエラーが発生しました。';
            console.error(err);
        }

        btn.disabled = false;
        btn.innerText = '録音開始';
    }

    // 起動
    initAI();
</script>
</body>
</html>
